services:
  yolobox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${YOLO_USERNAME:-yolo}
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        INSTALL_PI: ${INSTALL_PI:-true}
    image: ${DOCKER_IMAGE:-yoloimage}
    container_name: ${CONTAINER_NAME:-yolo-claudecode}
    hostname: ${CONTAINER_NAME:-yolo-claudecode}

    environment:
      # Host user UID/GID to align the in-container user with, so files written to
      # the mounted /workspace stay accessible on the host. If unset, the entrypoint
      # auto-detects from the /workspace mount owner. Set in .env or export before
      # `docker compose up`, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g).
      HOST_UID: ${HOST_UID:-}
      HOST_GID: ${HOST_GID:-}
      # Simplified LLM configuration - auto-discovers models from endpoint
      LLM_ENDPOINT: ${LLM_ENDPOINT:-}
      LLM_API_KEY: ${LLM_API_KEY:-}

    ports:
      - "${HOST_PORT:-22222}:22"

    volumes:
      - ${WORKSPACE_PATH:-${HOME}/workspace/${CONTAINER_NAME:-yolo-claudecode}}:/workspace

    restart: unless-stopped
