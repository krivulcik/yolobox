services:
  yolobox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${YOLO_USERNAME:-yolo}
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        INSTALL_PI: ${INSTALL_PI:-true}
    image: ${DOCKER_IMAGE:-yoloimage}
    container_name: ${CONTAINER_NAME:-yolo-claudecode}
    hostname: ${CONTAINER_NAME:-yolo-claudecode}

    environment:
      # Simplified LLM configuration - auto-discovers models from endpoint
      LLM_ENDPOINT: ${LLM_ENDPOINT:-}

    ports:
      - "${HOST_PORT:-22222}:22"

    volumes:
      - ${WORKSPACE_PATH:-${HOME}/workspace/${CONTAINER_NAME:-yolo-claudecode}}:/workspace

    restart: unless-stopped
